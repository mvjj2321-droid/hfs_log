<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Login</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.card{
    width:350px;
    background:#1d1d1d;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,255,0,.15);
}

h1{
    margin-top:0;
}

#status{
    font-size:22px;
    color:#00ff66;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h1>HF Login</h1>

<div id="status">
Connecting...
</div>

</div>

<script type="module">

import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

const status = document.getElementById("status");

async function login(){

    try{

        const app = await Client.connect("Movajao/Userlog");

        await app.predict("/login",{
            name:"Jason"
        });

        status.innerHTML="✅ Jason Logged In";

    }

    catch(err){

        console.error(err);

        status.innerHTML="❌ Failed";

    }

}

login();

</script>

</body>
</html>
